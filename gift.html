<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Your Surprise Gift!</title>
    <link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Poppins:wght@300;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <style>
        .gallery-container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 30px;
            padding: 40px 20px;
            max-width: 1200px;
            margin: 0 auto;
        }
        
        .gallery-item {
            width: 30%;
            min-width: 280px;
            transform: rotate(-2deg);
            transition: transform 0.3s, z-index 0.3s;
        }
        
        .gallery-item:nth-child(even) {
            transform: rotate(3deg);
        }
        
        .gallery-item:hover {
            transform: scale(1.05) rotate(0deg);
            z-index: 10;
        }
        
        .page-title {
            text-align: center;
            margin-top: 60px;
            font-size: 4rem;
        }
        
        .back-btn-container {
            text-align: center;
            margin: 60px 0;
        }
    </style>
</head>
<body>

    <!-- Animated Floating Background -->
    <div class="animated-bg">
        <div class="bg-bubble" style="width: 40px; height: 40px; left: 10%; animation-duration: 12s;"></div>
        <div class="bg-bubble heart" style="left: 20%; animation-duration: 15s;">💖</div>
        <div class="bg-bubble" style="width: 60px; height: 60px; left: 70%; animation-duration: 20s;"></div>
        <div class="bg-bubble heart" style="left: 85%; animation-duration: 14s;">🎉</div>
    </div>

    <h1 class="page-title">Surprise Party Memories! 🎈</h1>
    
    <div class="gallery-container">
        <!-- Image 1 -->
        <div class="gallery-item polaroid-img">
            <img src="bd_images/WhatsApp Image 2026-05-10 at 09.10.07.jpeg" alt="Surprise Party 1" style="width: 100%; border-radius: 5px;">
        </div>
        <!-- Image 2 -->
        <div class="gallery-item polaroid-img">
            <img src="bd_images/WhatsApp Image 2026-05-10 at 09.10.07 (1).jpeg" alt="Surprise Party 2" style="width: 100%; border-radius: 5px;">
        </div>
        <!-- Image 3 -->
        <div class="gallery-item polaroid-img">
            <img src="bd_images/WhatsApp Image 2026-05-10 at 09.10.07 (2).jpeg" alt="Surprise Party 3" style="width: 100%; border-radius: 5px;">
        </div>
        <!-- Image 4 -->
        <div class="gallery-item polaroid-img">
            <img src="bd_images/WhatsApp Image 2026-05-10 at 09.10.07 (3).jpeg" alt="Surprise Party 4" style="width: 100%; border-radius: 5px;">
        </div>
        <!-- Image 5 -->
        <div class="gallery-item polaroid-img">
            <img src="bd_images/WhatsApp Image 2026-05-10 at 09.11.20.jpeg" alt="Surprise Party 5" style="width: 100%; border-radius: 5px;">
        </div>
    </div>
    
    <div class="back-btn-container">
        <a href="index.html" class="gift-btn" style="background-color: #8b5a2b;">⬅ Back to Our Story</a>
    </div>

    <!-- Scripts -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
    <script>
        gsap.from('.gallery-item', {
            y: 50,
            opacity: 0,
            duration: 1,
            stagger: 0.2,
            ease: "back.out(1.5)"
        });
    </script>
</body>
</html>
